<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PHOTO BOOTH</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fdf5f6;
display:flex;
justify-content:center;
align-items:center;
}

#app{
position:relative;
height:100dvh;
aspect-ratio:1158/2000;
max-width:100%;
overflow:hidden;
background:#fff;
}

.screen{
display:none;
position:absolute;
inset:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
}

.screen.active{display:block;}

button{
position:absolute;
opacity:0;
border:none;
cursor:pointer;
z-index:100;
}

#s0{background-image:url('./bg_start.jpg')}
#startBtn{top:49.9%;left:31.1%;width:37.3%;height:5%}

#s1{background-image:url('./bg_cam.jpg')}

#frame-wrap{
position:absolute;
top:28.5%;
left:27.4%;
width:45.3%;
height:35%;
overflow:hidden;
z-index:50;
}

#vid{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#btn-normal{top:76.4%;left:15.4%;width:19.9%;height:2.9%}
#btn-bw{top:76.4%;left:40.8%;width:19.9%;height:2.9%}
#btn-ccd{top:76.4%;left:66.4%;width:19.9%;height:2.9%}

.cd-overlay{
display:flex;
align-items:center;
justify-content:center;
position:absolute;
inset:0;
font-size:80px;
font-weight:900;
color:#fff;
opacity:0;
z-index:60;
}

.flash-overlay{
position:absolute;
inset:0;
background:#fff;
opacity:0;
z-index:70;
}

#s2{background-image:url('./bg_preview.jpg')}

#stripWrap{
position:absolute;
top:24.5%;
left:50%;
transform:translateX(-50%);
height:50%;
}

#retakeBtn{top:80.1%;left:25.1%;width:19.9%;height:2.9%}
#confirmBtn{top:80.1%;left:56.5%;width:19.9%;height:2.9%}

#s3{background-image:url('./bg_print.jpg')}

#printWrap{
position:absolute;
top:28%;
left:50%;
transform:translateX(-50%);
width:22%;
}

#printImg{
width:100%;
transform:translateY(-100%);
}

#saveHitbox{
position:absolute;
inset:0;
background:transparent;
}

#s4{background-image:url('./bg_save.jpg')}

#fullImg{
position:absolute;
top:31%;
left:43.5%;
width:12.9%;
height:37.9%;
object-fit:contain;
}

#homeBtn{top:81.7%;left:41%;width:19.9%;height:2.9%}

</style>
</head>

<body>

<div id="app">

<div id="s0" class="screen active">
<button id="startBtn"></button>
</div>

<div id="s1" class="screen">

<div id="frame-wrap">
<video id="vid" autoplay playsinline muted></video>
<div class="cd-overlay" id="cdEl"></div>
<div class="flash-overlay" id="flashEl"></div>
</div>

<button id="btn-normal" data-f="normal"></button>
<button id="btn-bw" data-f="bw"></button>
<button id="btn-ccd" data-f="ccd"></button>

</div>

<div id="s2" class="screen">
<div id="stripWrap">
<canvas id="prevCv"></canvas>
</div>
<button id="retakeBtn"></button>
<button id="confirmBtn"></button>
</div>

<div id="s3" class="screen">
<div id="printWrap">
<img id="printImg">
<button id="saveHitbox"></button>
</div>
</div>

<div id="s4" class="screen">
<img id="fullImg">
<button id="homeBtn"></button>
</div>

</div>

<script>

var vid=document.getElementById("vid")

var stream=null
var curFilter="normal"
var shots=[]
var stripUrl=""
var shooting=false

var W=540
var H=720
var PAD=21
var GAP=12
var BRD=4

var FILTER_CSS={
normal:'brightness(1.1) contrast(1.15) saturate(0.9) sepia(0.2)',
bw:'grayscale(1) contrast(1.3) brightness(1.1) sepia(0.2)',
ccd:'brightness(1.25) contrast(1.2) saturate(0.8)'
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function applyFilter(f){
curFilter=f
vid.style.filter=FILTER_CSS[f]
}

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"},
audio:false
})

vid.srcObject=stream

await new Promise(r=>vid.onloadedmetadata=r)

vid.play()

applyFilter(curFilter)

show("s1")

}

document.getElementById("startBtn").onclick=startCamera

document.querySelectorAll("[data-f]").forEach(b=>{
b.onclick=()=>applyFilter(b.dataset.f)
})

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

async function countdown(){

var el=document.getElementById("cdEl")

for(let i=3;i>=1;i--){
el.textContent=i
el.style.opacity=1
await sleep(800)
el.style.opacity=0
await sleep(200)
}

}

async function flash(){

var f=document.getElementById("flashEl")

f.style.opacity=1
await sleep(100)
f.style.opacity=0
await sleep(200)

}

async function captureFrame(){

var prevFilter=vid.style.filter
vid.style.filter="none"

var raw=document.createElement("canvas")
raw.width=W
raw.height=H
var rctx=raw.getContext("2d")

var vr=vid.videoWidth/vid.videoHeight
var cr=W/H

var sx=0
var sy=0
var sw=vid.videoWidth
var sh=vid.videoHeight

if(vr>cr){
sw=sh*cr
sx=(vid.videoWidth-sw)/2
}else{
sh=sw/cr
sy=(vid.videoHeight-sh)/2
}

rctx.translate(W,0)
rctx.scale(-1,1)

rctx.drawImage(vid,sx,sy,sw,sh,0,0,W,H)

rctx.setTransform(1,0,0,1,0,0)

var fc=document.createElement("canvas")
fc.width=W
fc.height=H
var fctx=fc.getContext("2d")

fctx.filter=FILTER_CSS[curFilter]
fctx.drawImage(raw,0,0,W,H)
fctx.filter="none"

vid.style.filter=prevFilter

return fc.toDataURL("image/jpeg",0.9)

}

document.getElementById("frame-wrap").onclick=async function(){

if(shooting)return

shooting=true

shots=[]

for(let i=0;i<4;i++){

await countdown()

await flash()

shots.push(await captureFrame())

if(i<3)await sleep(500)

}

shooting=false

buildStrip()

show("s2")

}

function buildStrip(){

var sw=W+PAD*2+BRD*2
var sh=(H+GAP)*4-GAP+PAD*2+BRD*2

var cv=document.getElementById("prevCv")
cv.width=sw
cv.height=sh

var ctx=cv.getContext("2d")

ctx.fillStyle="#111"
ctx.fillRect(0,0,sw,sh)

Promise.all(shots.map(s=>new Promise(r=>{
var im=new Image()
im.onload=()=>r(im)
im.src=s
}))).then(imgs=>{

imgs.forEach((im,i)=>{

var x=BRD+PAD
var y=BRD+PAD+(H+GAP)*i

ctx.drawImage(im,x,y,W,H)

})

stripUrl=cv.toDataURL("image/png")

})

}

document.getElementById("retakeBtn").onclick=startCamera

document.getElementById("confirmBtn").onclick=function(){

var p=document.getElementById("printImg")

p.src=stripUrl

show("s3")

setTimeout(()=>{

p.style.transition="transform 2.5s cubic-bezier(.22,1,.36,1)"
p.style.transform="translateY(0)"

},100)

}

document.getElementById("saveHitbox").onclick=function(){

document.getElementById("fullImg").src=stripUrl

show("s4")

}

document.getElementById("homeBtn").onclick=function(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

shots=[]
stripUrl=""

show("s0")

}

</script>

</body>
</html>
