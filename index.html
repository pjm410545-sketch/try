<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="preload" href="./bg_start.jpg" as="image">
<link rel="preload" href="./bg_cam.jpg" as="image">
<link rel="preload" href="./bg_preview.jpg" as="image">
<link rel="preload" href="./bg_print.jpg" as="image">
<link rel="preload" href="./bg_save.jpg" as="image">
<title>PHOTO BOOTH</title>
<style>
.print-top-area {
  position: absolute;
  top: 17.7%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
.print-slot {
  width: 49.8%; height: 34px;
  background: linear-gradient(180deg, #aaa, #ddd 50%, #aaa);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  position: relative; z-index: 40;
}
.print-slot-line { width: 75%; height: 6px; background: #222; border-radius: 3px; }
#printWrap {
  width: 21.4%; height: 62.2%;
  margin-top: -17px; overflow: hidden;
  position: relative; z-index: 50;
}
#saveHitbox {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0); border: none;
  cursor: pointer; z-index: 100; opacity: 1;
}
#printImg {
  width: 100%; height: auto;
  transform: translateY(0%);
  transition: transform 2.5s cubic-bezier(0.22, 1, 0.36, 1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%; height:100%; overflow:hidden;
  background-color:#fdf5f6;
  display:flex; justify-content:center; align-items:center;
}
#app{
  position:relative;
  width: auto; height: 100dvh;
  aspect-ratio: 1158 / 2000;
  max-width: 100%;
  overflow:hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  background-color: #fff;
}
@media (max-width: 768px) {
  #app { width:100%; height:100dvh; aspect-ratio:unset; }
}
.screen{
  display:none; width:100%; height:100%; position:absolute; inset:0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
}
.screen.active{display:block;}
.polka-bg,.star-layer,.title-area,.cam-top,.rev-title,.print-top,.filter-bar,.shutter-wrap{display:none !important;}
button{
  position:absolute; opacity:0; cursor:pointer;
  border:none; background:red; z-index:100;
}
#s0{background-image:url('./bg_start.jpg');}
#startBtn{top:49.9%;left:31.1%;width:37.3%;height:5%;}
#s1{background-image:url('./bg_cam.jpg');}
#frame-wrap{
  position:absolute;
  top:28.5%;left:27.4%;width:45.3%;height:35.0%;
  overflow:hidden; cursor:pointer; z-index:50;
}
#vid-wrap,#fcv,#captureCv,#frame-overlay{position:absolute;inset:0;width:100%;height:100%;}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#captureCv{display:none;}
#btn-normal{top:76.4%;left:15.4%;width:19.9%;height:2.9%;}
#btn-bw    {top:76.4%;left:40.8%;width:19.9%;height:2.9%;}
#btn-ccd   {top:76.4%;left:66.4%;width:19.9%;height:2.9%;}
.cd-overlay{display:flex;align-items:center;justify-content:center;position:absolute;inset:0;font-size:80px;font-weight:900;color:#fff;z-index:60;opacity:0;pointer-events:none;}
.flash-overlay{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:70;}
#s2{background-image:url('./bg_preview.jpg');}
#s2.active{display:flex;}
#stripWrap{position:absolute;top:24.5%;left:50%;transform:translateX(-50%);height:50%;}
#prevCv{width:100%!important;height:100%!important;object-fit:contain;}
#retakeBtn {top:80.1%;left:25.1%;width:19.9%;height:2.9%;}
#confirmBtn{top:80.1%;left:56.5%;width:19.9%;height:2.9%;}
#s3{background-image:url('./bg_print.jpg');}
#s4{background-image:url('./bg_save.jpg');}
#fullImg{
  position:absolute;
  top:31.0%;left:43.5%;
  width:12.9%;height:37.9%;
  object-fit:contain;z-index:100;
  -webkit-touch-callout:default;
}
#homeBtn{top:81.7%;left:41.0%;width:19.9%;height:2.9%;}
</style>
</head>
<body>
<div id="app">
  <div id="s0" class="screen active"><button id="startBtn"></button></div>
  <div id="s1" class="screen">
    <div id="frame-wrap">
      <div id="vid-wrap">
        <video id="vid" autoplay playsinline muted></video>
        <canvas id="fcv"></canvas>
        <canvas id="captureCv" width="720" height="960"></canvas>
        <div class="cd-overlay" id="cdEl"></div>
        <div class="flash-overlay" id="flashEl"></div>
      </div>
    </div>
    <button id="btn-normal" class="fbtn" data-f="normal"></button>
    <button id="btn-bw"     class="fbtn" data-f="bw"></button>
    <button id="btn-ccd"    class="fbtn" data-f="ccd"></button>
  </div>
  <div id="s2" class="screen">
    <div id="stripWrap"><canvas id="prevCv"></canvas></div>
    <button id="retakeBtn"></button>
    <button id="confirmBtn"></button>
  </div>
  <div id="s3" class="screen">
    <div class="print-top-area">
      <div class="print-slot"><div class="print-slot-line"></div></div>
      <div id="printWrap">
        <img id="printImg" src="" alt="">
        <button id="saveHitbox"></button>
      </div>
    </div>
  </div>
  <div id="s4" class="screen">
    <img id="fullImg" src="">
    <button id="homeBtn"></button>
  </div>
</div>
<script>
var stream=null, curFilter='normal', shots=[], shooting=false, stripUrl='';
var W=540, H=720, PAD=21, GAP=12, BRD=4;

var FILTER_CSS={
  normal:'brightness(1.1) contrast(1.15) saturate(0.9) sepia(0.2) blur(0.2px)',
  bw:    'grayscale(1) contrast(1.3) brightness(1.1) sepia(0.2) blur(0.3px)',
  ccd:   'brightness(1.3) contrast(1.2) saturate(0.8) blur(0.4px)'
};

var vid=document.getElementById('vid');

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function applyFilter(f){curFilter=f;vid.style.filter=FILTER_CSS[f];}

async function startCamera(){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
    vid.srcObject=stream;
    await new Promise(function(res){vid.onloadedmetadata=res;});
    await vid.play();
    shots=[];applyFilter(curFilter);show('s1');
  }catch(e){alert('카메라 권한이 필요해요 😥\n'+e.message);}
}

document.getElementById('startBtn').onclick=async function(){await startCamera();};
document.querySelectorAll('.fbtn').forEach(function(b){
  b.onclick=function(){applyFilter(b.dataset.f);};
});

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function countdown(){
  var el=document.getElementById('cdEl');
  for(var i=3;i>=1;i--){
    el.textContent=i;el.style.opacity='1';
    await sleep(800);el.style.opacity='0';await sleep(200);
  }
}
async function doFlash(){
  var f=document.getElementById('flashEl');
  f.style.background='#fff';f.style.transition='none';f.style.opacity='1';
  await sleep(100);
  f.style.transition='opacity 0.3s';f.style.opacity='0';await sleep(200);
}

function clamp(v){return v<0?0:v>255?255:v;}

async function captureFrame(){
  var c=document.createElement('canvas');c.width=W;c.height=H;
  var ctx=c.getContext('2d');
  var vr=vid.videoWidth/vid.videoHeight,cr=W/H;
  var sx=0,sy=0,sw=vid.videoWidth,sh=vid.videoHeight;
  if(vr>cr){sw=sh*cr;sx=(vid.videoWidth-sw)/2;}
  else{sh=sw/cr;sy=(vid.videoHeight-sh)/2;}
  ctx.translate(W,0);ctx.scale(-1,1);
  ctx.drawImage(vid,sx,sy,sw,sh,0,0,W,H);
  ctx.setTransform(1,0,0,1,0,0);

  var id=ctx.getImageData(0,0,W,H);var d=id.data;
  var f=curFilter;
  for(var i=0;i<d.length;i+=4){
    var r=d[i],g=d[i+1],b=d[i+2];
    if(f==='normal'){
      // brightness(1.1) contrast(1.15) saturate(0.9) sepia(0.1)
      r*=1.1;g*=1.1;b*=1.1;
      r=(r/255-0.5)*1.15+0.5;r*=255;g=(g/255-0.5)*1.15+0.5;g*=255;b=(b/255-0.5)*1.15+0.5;b*=255;
      var lum=r*0.2126+g*0.7152+b*0.0722;r=lum+(r-lum)*0.9;g=lum+(g-lum)*0.9;b=lum+(b-lum)*0.9;
      var sr=r*0.393+g*0.769+b*0.189,sg=r*0.349+g*0.686+b*0.168,sb=r*0.272+g*0.534+b*0.131;
      r=r*0.8+sr*0.2;g=g*0.8+sg*0.2;b=b*0.8+sb*0.2;
    }else if(f==='bw'){
      // grayscale contrast(1.3) brightness(1.1) sepia(0.2)
      var gv=r*0.2126+g*0.7152+b*0.0722;r=g=b=gv*1.1;
      r=(r/255-0.5)*1.3+0.5;r*=255;g=(g/255-0.5)*1.3+0.5;g*=255;b=(b/255-0.5)*1.3+0.5;b*=255;
      var sr2=r*0.393+g*0.769+b*0.189,sg2=r*0.349+g*0.686+b*0.168,sb2=r*0.272+g*0.534+b*0.131;
      r=r*0.8+sr2*0.2;g=g*0.8+sg2*0.2;b=b*0.8+sb2*0.2;
    }else if(f==='ccd'){
      // brightness(1.2) contrast(1.2) saturate(0.8) hue-rotate(-5deg)
      r*=1.2;g*=1.2;b*=1.2;
      r=(r/255-0.5)*1.2+0.5;r*=255;g=(g/255-0.5)*1.2+0.5;g*=255;b=(b/255-0.5)*1.2+0.5;b*=255;
      var lum2=r*0.2126+g*0.7152+b*0.0722;r=lum2+(r-lum2)*0.8;g=lum2+(g-lum2)*0.8;b=lum2+(b-lum2)*0.8;
    }
    d[i]=clamp(r);d[i+1]=clamp(g);d[i+2]=clamp(b);
  }
  ctx.putImageData(id,0,0);
  return c.toDataURL('image/jpeg',0.82);
}

document.getElementById('frame-wrap').onclick=async function(){
  if(shooting)return;
  shooting=true;shots=[];
  for(var i=0;i<4;i++){
    await countdown();await doFlash();
    shots.push(await captureFrame());
    if(i<3)await sleep(500);
  }
  shooting=false;buildStrip();show('s2');
};

function buildStrip(){
  var sw=W+PAD*2+BRD*2,sh=(H+GAP)*4-GAP+PAD*2+BRD*2;
  var cv=document.getElementById('prevCv');
  cv.width=sw;cv.height=sh;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#111';ctx.fillRect(0,0,sw,sh);
  Promise.all(shots.map(function(s){
    return new Promise(function(res){var im=new Image();im.onload=function(){res(im);};im.src=s;});
  })).then(function(imgs){
    imgs.forEach(function(im,i){
      var x=BRD+PAD,y=BRD+PAD+(H+GAP)*i;
      ctx.drawImage(im,x,y,W,H);

      // 비네팅 (normal, bw만)
      if(curFilter==='normal'||curFilter==='bw'){
        ctx.save();
        var vgrd=ctx.createRadialGradient(x+W/2,y+H/2,W*0.6,x+W/2,y+H/2,W*0.85);
        vgrd.addColorStop(0,'rgba(0,0,0,0)');
        vgrd.addColorStop(1,curFilter==='bw'?'rgba(0,0,0,0.55)':'rgba(0,0,0,0.4)');
        ctx.fillStyle=vgrd;
        ctx.fillRect(x,y,W,H);
        ctx.restore();
      }

    });
    stripUrl=cv.toDataURL('image/png');
  });
}

document.getElementById('retakeBtn').onclick=async function(){
  shots=[];applyFilter(curFilter);await startCamera();
};

document.getElementById('confirmBtn').onclick=function(){
  var pImg=document.getElementById('printImg');
  pImg.src=stripUrl;
  pImg.style.transition='none';
  pImg.style.transform='translateY(-100%)';
  show('s3');
  setTimeout(function(){
    pImg.style.transition='transform 2.5s cubic-bezier(0.22,1,0.36,1)';
    pImg.style.transform='translateY(0)';
  },100);
};

document.getElementById('saveHitbox').onclick=function(e){
  if(e)e.stopPropagation();
  if(!stripUrl)return;
  document.getElementById('fullImg').src=stripUrl;
  show('s4');
};

document.getElementById('homeBtn').onclick=function(){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  shots=[];stripUrl='';show('s0');
};
</script>
</body>
</html>
